name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            preset: ci-windows
            triplet: x64-windows
          - os: ubuntu-22.04
            preset: linux-debug
            triplet: x64-linux

    env:
      VCPKG_DEFAULT_TRIPLET: ${{ matrix.triplet }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Export GitHub Actions cache variables
        uses: actions/github-script@v7
        with:
          script: |
            core.exportVariable('ACTIONS_CACHE_URL', process.env.ACTIONS_CACHE_URL || '');
            core.exportVariable('ACTIONS_RUNTIME_TOKEN', process.env.ACTIONS_RUNTIME_TOKEN || '');

      - name: Setup vcpkg
        uses: lukka/run-vcpkg@v11
        with:
          vcpkgGitCommitId: '84bab45d415d22042bd0b9081aea57f362da3f35'
        env:
          VCPKG_BINARY_SOURCES: "clear;x-gha,readwrite"

      - name: Set up MSVC environment
        if: runner.os == 'Windows'
        uses: ilammy/msvc-dev-cmd@v1

      - name: Restore vcpkg root and install Ninja
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          # msvc-dev-cmd points VCPKG_ROOT at the VS-bundled vcpkg; restore
          # the instance run-vcpkg checked out so binary caching works.
          echo "VCPKG_ROOT=${{ github.workspace }}\vcpkg" >> $env:GITHUB_ENV
          choco install ninja -y --no-progress

      # Embedded-Python scripting (Phase 47) uses the system Python + pybind11,
      # not a vcpkg CPython build. Provide both and point CMake at them.
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install pybind11 and expose to CMake
        shell: bash
        run: |
          python -m pip install --upgrade pip
          python -m pip install pybind11
          echo "pybind11_DIR=$(python -c 'import pybind11; print(pybind11.get_cmake_dir())')" >> "$GITHUB_ENV"
          echo "Python3_ROOT_DIR=$(python -c 'import sys; print(sys.prefix)')" >> "$GITHUB_ENV"
          echo "Python3_EXECUTABLE=$(python -c 'import sys; print(sys.executable)')" >> "$GITHUB_ENV"

      - name: Install Linux dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            libgl1-mesa-dev \
            libglu1-mesa-dev \
            libegl1-mesa-dev \
            libxcb1-dev \
            libxcb-cursor-dev \
            libxcb-icccm4-dev \
            libxcb-image0-dev \
            libxcb-keysyms1-dev \
            libxcb-randr0-dev \
            libxcb-render-util0-dev \
            libxcb-shape0-dev \
            libxcb-shm0-dev \
            libxcb-sync-dev \
            libxcb-xfixes0-dev \
            libxcb-xinerama0-dev \
            libxcb-xkb-dev \
            libxkbcommon-dev \
            libxkbcommon-x11-dev \
            libfontconfig1-dev \
            libfreetype6-dev \
            autoconf \
            autoconf-archive \
            automake \
            libtool \
            ninja-build \
            pkg-config

      - name: Configure
        run: cmake --preset ${{ matrix.preset }}

      - name: Build
        run: cmake --build build/${{ matrix.preset }} --config Debug

      - name: Test
        run: ctest --test-dir build/${{ matrix.preset }} -C Debug --output-on-failure

  asan:
    name: AddressSanitizer
    runs-on: ubuntu-22.04
    env:
      VCPKG_DEFAULT_TRIPLET: x64-linux

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # ASan-instrumented, statically-linked Qt test binaries are several
      # hundred MB each; with the full test suite they overran the runner's
      # ~14 GB free disk during linking ("ld: No space left on device").
      # Reclaim the large preinstalled toolchains we don't use (~25 GB).
      - name: Free disk space
        run: |
          sudo rm -rf /usr/share/dotnet /opt/ghc /usr/local/lib/android \
            /usr/local/share/boost /usr/local/share/powershell \
            /opt/hostedtoolcache/CodeQL "${AGENT_TOOLSDIRECTORY:-}"
          sudo docker image prune --all --force || true
          df -h /

      - name: Export GitHub Actions cache variables
        uses: actions/github-script@v7
        with:
          script: |
            core.exportVariable('ACTIONS_CACHE_URL', process.env.ACTIONS_CACHE_URL || '');
            core.exportVariable('ACTIONS_RUNTIME_TOKEN', process.env.ACTIONS_RUNTIME_TOKEN || '');

      - name: Setup vcpkg
        uses: lukka/run-vcpkg@v11
        with:
          vcpkgGitCommitId: '84bab45d415d22042bd0b9081aea57f362da3f35'
        env:
          VCPKG_BINARY_SOURCES: "clear;x-gha,readwrite"

      - name: Install Linux dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            libgl1-mesa-dev \
            libglu1-mesa-dev \
            libegl1-mesa-dev \
            libxcb1-dev \
            libxcb-cursor-dev \
            libxcb-icccm4-dev \
            libxcb-image0-dev \
            libxcb-keysyms1-dev \
            libxcb-randr0-dev \
            libxcb-render-util0-dev \
            libxcb-shape0-dev \
            libxcb-shm0-dev \
            libxcb-sync-dev \
            libxcb-xfixes0-dev \
            libxcb-xinerama0-dev \
            libxcb-xkb-dev \
            libxkbcommon-dev \
            libxkbcommon-x11-dev \
            libfontconfig1-dev \
            libfreetype6-dev \
            autoconf \
            autoconf-archive \
            automake \
            libtool \
            ninja-build \
            pkg-config

      - name: Configure with ASan
        run: cmake --preset linux-debug -DHZ_ENABLE_SANITIZERS=ON

      - name: Build
        run: cmake --build build/linux-debug --config Debug

      - name: Test
        run: ctest --test-dir build/linux-debug -C Debug --output-on-failure

  format-check:
    name: Format Check
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install clang-format
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends clang-format-15

      - name: Check formatting
        run: |
          find src tests -name '*.h' -o -name '*.cpp' | \
            xargs clang-format-15 --dry-run --Werror

  static-analysis:
    name: Static Analysis
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Export GitHub Actions cache variables
        uses: actions/github-script@v7
        with:
          script: |
            core.exportVariable('ACTIONS_CACHE_URL', process.env.ACTIONS_CACHE_URL || '');
            core.exportVariable('ACTIONS_RUNTIME_TOKEN', process.env.ACTIONS_RUNTIME_TOKEN || '');

      - name: Setup vcpkg
        uses: lukka/run-vcpkg@v11
        with:
          vcpkgGitCommitId: '84bab45d415d22042bd0b9081aea57f362da3f35'
        env:
          VCPKG_BINARY_SOURCES: "clear;x-gha,readwrite"

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            clang-tidy-15 \
            libgl1-mesa-dev \
            libglu1-mesa-dev \
            libegl1-mesa-dev \
            libxcb1-dev \
            libxcb-cursor-dev \
            libxcb-icccm4-dev \
            libxcb-image0-dev \
            libxcb-keysyms1-dev \
            libxcb-randr0-dev \
            libxcb-render-util0-dev \
            libxcb-shape0-dev \
            libxcb-shm0-dev \
            libxcb-sync-dev \
            libxcb-xfixes0-dev \
            libxcb-xinerama0-dev \
            libxcb-xkb-dev \
            libxkbcommon-dev \
            libxkbcommon-x11-dev \
            libfontconfig1-dev \
            libfreetype6-dev \
            autoconf \
            autoconf-archive \
            automake \
            libtool \
            ninja-build \
            pkg-config

      - name: Configure with compile_commands.json
        run: cmake --preset linux-debug

      - name: Run clang-tidy
        run: |
          # Enforced gate: every bugprone-*/performance-* warning FAILS the
          # build except the known-dirty backlog below (advisory-only until
          # their existing findings are burned down).  Do not add a check to
          # the exclusion list to get a PR green — fix the finding instead.
          set -o pipefail
          find src -name '*.cpp' | \
            xargs clang-tidy-15 \
              -p build/linux-debug \
              --checks='-*,bugprone-*,performance-*' \
              --warnings-as-errors='*,-bugprone-easily-swappable-parameters,-bugprone-narrowing-conversions,-bugprone-implicit-widening-of-multiplication-result,-bugprone-branch-clone,-bugprone-misplaced-widening-cast,-bugprone-reserved-identifier,-bugprone-incorrect-roundings,-performance-no-int-to-ptr,-performance-inefficient-string-concatenation,-performance-unnecessary-value-param' \
              2>&1 | tee clang-tidy-output.txt
          echo "::notice::clang-tidy gate passed (excluded-check warnings above are the advisory backlog)."
